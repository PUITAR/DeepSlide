<!doctype html>
<html lang="zh-CN">
<head>
 <meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1" />
 <title>Logra · 前后端拓扑图</title>
 <link rel="stylesheet" href="style.css" />
</head>
<body>
 <header class="toolbar">
  <div class="brand">Logra</div>
  <div class="spacer"></div>
  <button id="loadDemo" class="btn btn-secondary">加载示例</button>
  <button id="exportGraph" class="btn btn-secondary">导出 JSON</button>
  <button id="submitGraph" class="btn">提交图</button>
 </header>
 <main>
  <aside class="panel">
   <h3>节点顺序 (顺序边)</h3>
   <ol id="sequenceList" class="seq"></ol>
      <div id="addNodeForm" class="form" style="margin-top: 10px;">
          <input id="newNodeId" placeholder="新节点ID (如: D)" />
          <input id="newNodeLabel" placeholder="新节点标签 (如: Cache)" />
          <button id="addNodeBtn" class="btn btn-secondary">添加节点</button>
      </div>
   <h3>添加关系 (关联边)</h3>
   <div class="form">
    <input id="relFrom" placeholder="from 节点ID" />
    <input id="relTo" placeholder="to 节点ID" />
    <input id="relWeight" placeholder="权重 (number)" type="number" step="0.1" />
    <input id="relDesc" placeholder="描述 (text)" />
    <button id="addRel" class="btn btn-secondary">添加关联边</button>
   </div>

      <h3>选中元素操作</h3>
      <div id="selectionInfo" class="status" style="display: none; padding: 15px;">
          <p id="selectedType">无选中元素</p>
          <p id="selectedDetails"></p>
          <button id="deleteElement" class="btn" style="background: #a40e26; margin-top: 10px;">删除选中元素</button>
      </div>

      <h3>导入 / 导出</h3>
      <div class="io-area">
          <textarea id="ioJson" placeholder="在此粘贴要导入的 JSON，或导出时显示"></textarea>
          <div class="io-buttons">
              <button id="importGraph" class="btn btn-secondary">导入 JSON</button>
          </div>
      </div>
   <div id="status" class="status"></div>
  </aside>
  <section class="canvas">
   <svg id="graph" width="100%" height="100%"></svg>
  </section>
 </main>
 <script src="app.js"></script>
</body>
</html>
