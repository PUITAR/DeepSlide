<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>图片多区域依次放大效果</title>

<style>
.container{
  position: relative;
  width: 800px;   /* 你可以调整 */
  margin: 40px auto;
}

/* 背景图（整体变暗） */
.base-img{
  width: 100%;
  filter: brightness(60%);
  display: block;
}

/* 高亮放大块 */
.focus-box{
  position: absolute;
  border: 3px solid red;
  overflow: hidden;
  box-shadow: 0 0 20px rgba(255,0,0,0.6);
  transition: transform 0.6s ease, opacity 0.6s ease;
  opacity: 0;
  z-index: 10;
}

/* 放大状态 */
.focus-box.active{
  transform: scale(1.1);
  opacity: 1;
  z-index: 11;
}

/* 框里的图片（不缩放，靠移动制造“裁剪”效果） */
.focus-box img{
  position: absolute;
}
</style>
</head>

<body>

<div class="container">
  <img id="base" class="base-img" src="image.png">

  <!-- 重点区域盒子（2个：左半、右半） -->
  <div class="focus-box" id="left-half"><img src="image.png"></div>
  <div class="focus-box" id="right-half"><img src="image.png"></div>
</div>

<script>
window.onload = function() {
  const baseImg = document.getElementById('base');
  
  // 确保图片已加载以获取正确尺寸
  function init() {
    const w = baseImg.clientWidth;
    const h = baseImg.clientHeight;

    // 定义左半和右半区域
    const regions = [
      {box: "left-half", x: 0, y: 0, w: w/2, h: h},
      {box: "right-half", x: w/2, y: 0, w: w/2, h: h}
    ];

    // 初始化盒子样式
    regions.forEach(r => {
      const box = document.getElementById(r.box);
      const img = box.querySelector("img");

      // 设置盒子位置和大小
      box.style.left = r.x + "px";
      box.style.top = r.y + "px";
      box.style.width = r.w + "px";
      box.style.height = r.h + "px";

      // 设置内部图片位置和大小
      // 内部图片必须和底图一样大，才能通过 offset 实现裁剪
      img.style.width = w + "px";
      img.style.height = h + "px";
      img.style.left = -r.x + "px";
      img.style.top = -r.y + "px";
    });

    /* 轮流激活放大效果 */
    let idx = 0;
    function cycle(){
      regions.forEach(r => {
        document.getElementById(r.box).classList.remove("active");
      });

      const cur = regions[idx];
      document.getElementById(cur.box).classList.add("active");

      idx = (idx + 1) % regions.length;
    }

    /* 自动播放 */
    cycle(); // 立即展示第一个
    setInterval(cycle, 2000); // 每 2 秒切换一次
  }

  if (baseImg.complete) {
    init();
  } else {
    baseImg.onload = init;
  }
};
</script>

</body>
</html>
